version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin # Simulated username
      - MONGO_INITDB_ROOT_PASSWORD=password # Simulated password

  api:
    build: .
    container_name: restaurant-api
    ports:
      - "3040:3040"
    environment:
      - PORT=3040
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/plenydb?authSource=admin
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
